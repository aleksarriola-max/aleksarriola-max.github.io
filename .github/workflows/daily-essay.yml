name: Publish Daily Essay

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run publisher
        run: python publish_essay.py

      - name: Commit and push
        run: |
          git config user.name "Aleks Portfolio Bot"
          git config user.email "aleksarriola@gmail.com"
          git add index.html essay_state.json
          git diff --staged --quiet || git commit -m "Daily essay: $(date +'%Y-%m-%d')"
          git push
